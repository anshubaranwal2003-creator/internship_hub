


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        /* CSS - Basic styling for the Admin Dashboard */
        body {
            font-family: Arial, sans-serif;
            background-color:rgb(110, 6, 185);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }

        table {
            margin: 20px auto;
            width: 90%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 8px rgba(41, 205, 205, 0.85);
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color:rgb(208, 33, 224);
        }

        tr:hover {
            background-color:rgb(158, 165, 79);
        }

        select {
            padding: 5px;
            font-size: 14px;
        }

        button {
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            table {
                width: 100%;
            }

            th, td {
                padding: 10px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <h1>Admin Dashboard</h1>

    <table>
        <tr>
            <th>Application ID</th>
            <th>Student ID</th>
            <th>Internship ID</th>
            <th>Date Applied</th>
            <th>Status</th>
            <th>Update Status</th>
        </tr>

        <!-- Loop through applications and display them -->
        
        <tr>

                <!-- Form to update status -->
                <form action="/update_status/1" method="POST">
                    <select name="status">
                        <option value="Pending" selected>Pending</option>
                        <option value="Accepted" >Accepted</option>
                        <option value="Rejected" >Rejected</option>
                    </select>
                    <button type="submit">Update</button>
                </form>
            </td>
        </tr>

    </table>

    <script>
        // Example JavaScript for dynamic interaction (optional)
        // Add additional functionality if needed in the future
        document.addEventListener('DOMContentLoaded', function() {
            const statusSelects = document.querySelectorAll('select[name="status"]');
            
            // Example: Custom validation or changes based on selected status
            statusSelects.forEach(function(select) {
                select.addEventListener('change', function() {
                    // You can add some logic here to perform on status change
                    console.log('Status updated to:', select.value);
                });
            });
        });
    </script>

</body>
</html>
