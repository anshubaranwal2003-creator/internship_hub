<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful | InternshipHub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, #a1c4fd, #c2e9fb);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .success-container {
            background-color: #fff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 1.2s ease;
        }

        .success-container h2 {
            color: #28a745;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .success-container p {
            font-size: 18px;
            color: #444;
            margin-bottom: 30px;
        }

        .btn-home {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-home:hover {
            background-color: #0056b3;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
        }

        .checkmark-circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 6;
            stroke-miterlimit: 10;
            stroke: #28a745;
            fill: none;
            animation: stroke 0.6s forwards ease-in-out;
        }

        .checkmark-check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke-width: 6;
            stroke: #28a745;
            fill: none;
            animation: stroke 0.4s 0.6s forwards ease-in-out;
        }

        @keyframes stroke {
            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="checkmark">
            <svg viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
                <path class="checkmark-check" fill="none" d="M14 27l7 7 16-16"/>
            </svg>
        </div>
        <h2>Payment Successful! 🎉</h2>
        <p>Thank you for applying to our premium internships.<br>We’ll contact you shortly via email.</p>
        <a class="btn-home" href="/">Go Home</a>
    </div>

    <script>
        // You can add tracking or thank-you messages here
        console.log("🎉 Payment success page loaded");
    </script>

</body>
</html>
