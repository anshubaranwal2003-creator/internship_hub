<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InternshipHub - Pay to Apply</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:rgb(195, 11, 241);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h2 {
            color: #333;
        }

        form {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(18, 232, 139, 0.94);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="number"] {
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background-color: #6772e5;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5469d4;
        }
    </style>
</head>
<body>

    <h2>Apply to Premium Internship</h2>
    <form action="/pay" method="POST">
        <label for="amount">Enter Amount (INR):</label>
        <input type="number" id="amount" name="amount" min="1" required>
        <button type="submit">Pay with Stripe</button>
    </form>

    <script>
        // Optional JS placeholder – for client-side validation or Stripe.js later
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            const amount = document.getElementById('amount').value;
            if (amount < 1) {
                alert('Please enter a valid amount.');
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
